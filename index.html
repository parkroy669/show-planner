<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예능 프로그램 기획안 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid #e8e8e4;
  }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
  textarea, input[type="text"] {
    width: 100%;
    border: 1px solid #e0e0db;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fafaf8;
    transition: border-color 0.15s;
  }
  textarea { resize: vertical; min-height: 60px; }
  textarea:focus, input[type="text"]:focus { outline: none; border-color: #1a1a1a; background: #fff; }
  .ref-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .ref-num { font-size: 13px; color: #999; width: 20px; text-align: right; flex-shrink: 0; }
  .ref-item input { flex: 1; }
  .btn-remove {
    width: 28px; height: 28px; border: 1px solid #e0e0db; border-radius: 50%;
    background: transparent; cursor: pointer; font-size: 16px; color: #999;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .btn-remove:hover { background: #fff0f0; color: #e53e3e; border-color: #fca5a5; }
  .btn-add {
    font-size: 13px; color: #666; background: transparent;
    border: 1px dashed #ccc; border-radius: 8px;
    padding: 8px 14px; cursor: pointer; width: 100%; margin-top: 4px;
    transition: all 0.15s;
  }
  .btn-add:hover { background: #f5f5f3; border-color: #999; }
  .btn-generate {
    width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
    background: #1a1a1a; color: #fff; border: none;
    border-radius: 10px; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-generate:hover { opacity: 0.85; }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
  .divider { border: none; border-top: 1px solid #e8e8e4; margin: 1.5rem 0; }
  .result-item {
    background: #fff; border: 1px solid #e8e8e4; border-radius: 12px;
    padding: 1.25rem; margin-bottom: 10px;
  }
  .result-num { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 5px; letter-spacing: 0.05em; }
  .result-title { font-size: 17px; font-weight: 600; margin-bottom: 7px; }
  .result-desc { font-size: 13px; color: #555; line-height: 1.65; }
  .result-hook {
    font-size: 12px; color: #2563eb; margin-top: 8px;
    padding-top: 8px; border-top: 1px solid #f0f0ec;
  }
  .copy-btn {
    display: block; width: 100%; margin-top: 1rem; padding: 11px; font-size: 13px;
    color: #666; background: transparent; border: 1px solid #e0e0db;
    border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .copy-btn:hover { background: #f5f5f3; }
  .loading-box { text-align: center; padding: 2.5rem; color: #666; font-size: 14px; }
  .spinner {
    width: 32px; height: 32px; border: 2px solid #e0e0db;
    border-top-color: #1a1a1a; border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #fff5f5; color: #c53030; border: 1px solid #fca5a5;
    border-radius: 10px; padding: 12px 16px; font-size: 13px; line-height: 1.6;
  }

  /* 채팅 영역 */
  .chat-section { margin-top: 1.5rem; }
  .chat-header {
    font-size: 13px; font-weight: 600; color: #666;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .chat-header::before {
    content: '';
    display: inline-block; width: 8px; height: 8px;
    background: #22c55e; border-radius: 50%;
  }
  .chat-messages {
    background: #fff; border: 1px solid #e8e8e4; border-radius: 14px;
    padding: 1rem; margin-bottom: 10px;
    max-height: 420px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .msg-user {
    align-self: flex-end;
    background: #1a1a1a; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg-ai {
    align-self: flex-start;
    background: #f5f5f3; color: #1a1a1a;
    border-bottom-left-radius: 4px;
  }
  .msg-typing {
    align-self: flex-start;
    background: #f5f5f3; color: #999;
    border-bottom-left-radius: 4px;
    font-size: 13px;
  }
  .chat-input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  .chat-input {
    flex: 1; border: 1px solid #e0e0db; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; font-family: inherit;
    color: #1a1a1a; background: #fff; resize: none;
    min-height: 44px; max-height: 120px; line-height: 1.5;
    transition: border-color 0.15s;
  }
  .chat-input:focus { outline: none; border-color: #1a1a1a; }
  .btn-send {
    width: 44px; height: 44px; flex-shrink: 0;
    background: #1a1a1a; color: #fff; border: none;
    border-radius: 10px; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .btn-send:hover { opacity: 0.8; }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
  .chat-hint {
    font-size: 12px; color: #aaa; margin-top: 6px; text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h1>예능 프로그램 기획안 생성기</h1>
  <p class="subtitle">주제와 레퍼런스 프로그램을 입력하면 AI가 10개의 기획안을 만들어드립니다.</p>

  <div class="card">
    <label>프로그램 주제</label>
    <textarea id="topic" placeholder="예: 중년 남성들의 첫 요리 도전기" rows="2"></textarea>
  </div>

  <div class="card">
    <label>비슷한 형식의 레퍼런스 프로그램</label>
    <div id="ref-list"></div>
    <button class="btn-add" onclick="addRef()">+ 프로그램 추가</button>
  </div>

  <button class="btn-generate" id="gen-btn" onclick="generate()">기획안 10개 생성하기</button>

  <hr class="divider" id="result-divider" style="display:none">
  <div id="result-area"></div>

  <div class="chat-section" id="chat-section" style="display:none">
    <div class="chat-header">PD와 대화하기</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chat-input"
        placeholder="예: 3번 기획안 더 발전시켜줘 / 좀 더 자극적으로 바꿔봐"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendChat()">↑</button>
    </div>
    <p class="chat-hint">Enter로 전송 / Shift+Enter로 줄바꿈</p>
  </div>
</div>

<script>
let refs = ['', '', '', ''];
let generatedItems = [];
let chatHistory = [];
let isChatting = false;

function renderRefs() {
  const list = document.getElementById('ref-list');
  list.innerHTML = '';
  refs.forEach((val, i) => {
    const row = document.createElement('div');
    row.className = 'ref-item';
    row.innerHTML = `
      <span class="ref-num">${i+1}.</span>
      <input type="text" placeholder="프로그램 제목" value="${val}" oninput="refs[${i}] = this.value" />
      ${refs.length > 1 ? `<button class="btn-remove" onclick="removeRef(${i})">×</button>` : ''}
    `;
    list.appendChild(row);
  });
}

function addRef() {
  if (refs.length >= 8) return;
  refs.push('');
  renderRefs();
}

function removeRef(i) {
  refs.splice(i, 1);
  renderRefs();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

function copyAll(items) {
  const text = items.map((item, i) =>
    `[기획안 ${i+1}] ${item.title}\n${item.desc}\n흡입 포인트: ${item.hook}`
  ).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-all-btn');
    if (btn) { btn.textContent = '복사 완료!'; setTimeout(() => btn.textContent = '전체 결과 복사', 1500); }
  });
}

function buildContextString(items) {
  return items.map((item, i) =>
    `기획안 ${i+1}: ${item.title}\n설명: ${item.desc}\n포인트: ${item.hook}`
  ).join('\n\n');
}

function appendMessage(role, text) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = role === 'user' ? 'msg msg-user' : 'msg msg-ai';
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function appendTyping() {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg msg-typing';
  div.id = 'typing-indicator';
  div.textContent = 'PD가 생각 중...';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  const filledRefs = refs.filter(r => r.trim());
  if (!topic) { alert('주제를 입력해주세요.'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '생성 중...';

  document.getElementById('result-divider').style.display = 'block';
  document.getElementById('chat-section').style.display = 'none';
  document.getElementById('result-area').innerHTML = `
    <div class="loading-box">
      <div class="spinner"></div>
      AI가 기획안을 작성하고 있습니다...
    </div>`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, refs: filledRefs }),
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      document.getElementById('result-area').innerHTML = `<div class="error-box">오류: ${data.error}</div>`;
      btn.disabled = false; btn.textContent = '기획안 10개 생성하기'; return;
    }

    generatedItems = data.items;
    chatHistory = [];

    let html = '';
    generatedItems.forEach((item, i) => {
      html += `
        <div class="result-item">
          <div class="result-num">기획안 ${i+1}</div>
          <div class="result-title">${item.title}</div>
          <div class="result-desc">${item.desc}</div>
          ${item.hook ? `<div class="result-hook">흡입 포인트: ${item.hook}</div>` : ''}
        </div>`;
    });
    html += `<button class="copy-btn" id="copy-all-btn" onclick='copyAll(${JSON.stringify(generatedItems)})'>전체 결과 복사</button>`;
    document.getElementById('result-area').innerHTML = html;

    document.getElementById('chat-messages').innerHTML = '';
    appendMessage('ai', '기획안 10개 나왔어. 발전시키고 싶은 거 있으면 말해봐. 예) "3번 더 발전시켜줘" 또는 "좀 더 자극적으로 바꿔봐"');
    document.getElementById('chat-section').style.display = 'block';

  } catch(e) {
    document.getElementById('result-area').innerHTML = `<div class="error-box">오류: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = '기획안 10개 생성하기';
}

async function sendChat() {
  if (isChatting) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  isChatting = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  appendTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chatHistory,
        context: buildContextString(generatedItems),
      }),
    });
    const data = await res.json();
    removeTyping();

    if (!res.ok || data.error) {
      appendMessage('ai', '오류가 발생했어. 다시 해봐.');
    } else {
      appendMessage('ai', data.reply);
      chatHistory.push({ role: 'assistant', content: data.reply });
    }
  } catch(e) {
    removeTyping();
    appendMessage('ai', '네트워크 오류가 났어. 다시 해봐.');
  }

  isChatting = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

renderRefs();
</script>
</body>
</html>
