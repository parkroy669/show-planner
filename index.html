<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예능 기획안 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 2rem;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid #e8e8e8;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    margin-bottom: 8px;
  }

  textarea, input[type="text"] {
    width: 100%;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fafafa;
    transition: border-color 0.15s;
  }

  textarea { resize: vertical; min-height: 60px; }

  textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: #1a1a1a;
    background: #fff;
  }

  .ref-item {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .ref-num {
    font-size: 13px;
    color: #999;
    width: 18px;
    text-align: right;
    flex-shrink: 0;
  }

  .btn-remove {
    width: 30px; height: 30px;
    border: 1px solid #e0e0e0;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    font-size: 18px;
    color: #bbb;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .btn-remove:hover { background: #fff0f0; color: #e05; border-color: #fcc; }

  .btn-add {
    width: 100%;
    margin-top: 6px;
    padding: 9px;
    font-size: 13px;
    color: #888;
    background: transparent;
    border: 1px dashed #ccc;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-add:hover { background: #f5f5f5; color: #555; }

  .btn-generate {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
    margin-top: 0.5rem;
  }
  .btn-generate:hover { opacity: 0.85; }
  .btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }

  .divider { border: none; border-top: 1px solid #e8e8e8; margin: 1.5rem 0; }

  .result-item {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 10px;
  }
  .result-num { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 4px; letter-spacing: 0.5px; }
  .result-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .result-desc { font-size: 13px; color: #555; line-height: 1.65; }
  .result-hook {
    font-size: 12px;
    color: #2563eb;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #f0f0f0;
  }

  .copy-btn {
    display: block; width: 100%; margin-top: 1rem; padding: 11px;
    font-size: 13px; color: #555; background: #fff;
    border: 1px solid #e0e0e0; border-radius: 10px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .copy-btn:hover { background: #f5f5f5; }

  .loading {
    text-align: center; padding: 2.5rem;
    color: #888; font-size: 14px;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid #e0e0e0;
    border-top-color: #1a1a1a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #fff0f0;
    color: #c00;
    border: 1px solid #fcc;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>예능 기획안 생성기</h1>
  <p class="subtitle">주제와 레퍼런스 프로그램을 입력하면 AI가 기획안 10개를 만들어드립니다.</p>

  <div class="card">
    <label>프로그램 주제</label>
    <textarea id="topic" placeholder="예: 중년 남성들의 첫 요리 도전기" rows="2"></textarea>
  </div>

  <div class="card">
    <label>비슷한 형식의 레퍼런스 프로그램</label>
    <div id="ref-list"></div>
    <button class="btn-add" onclick="addRef()">+ 프로그램 추가</button>
  </div>

  <button class="btn-generate" id="gen-btn" onclick="generate()">기획안 10개 생성하기</button>

  <hr class="divider" id="divider" style="display:none">
  <div id="result-area"></div>
</div>

<script>
  let refs = ['', '', '', ''];

  function renderRefs() {
    const list = document.getElementById('ref-list');
    list.innerHTML = '';
    refs.forEach((val, i) => {
      const row = document.createElement('div');
      row.className = 'ref-item';
      row.innerHTML = `
        <span class="ref-num">${i+1}.</span>
        <input type="text" placeholder="프로그램 제목" value="${val}" oninput="refs[${i}] = this.value" />
        ${refs.length > 1 ? `<button class="btn-remove" onclick="removeRef(${i})">×</button>` : ''}
      `;
      list.appendChild(row);
    });
  }

  function addRef() {
    if (refs.length >= 8) return;
    refs.push('');
    renderRefs();
  }

  function removeRef(i) {
    refs.splice(i, 1);
    renderRefs();
  }

  function copyAll(items) {
    const text = items.map((item, i) =>
      `[기획안 ${i+1}] ${item.title}\n${item.desc}\n흡입 포인트: ${item.hook}`
    ).join('\n\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-all-btn');
      if (btn) { btn.textContent = '복사 완료!'; setTimeout(() => btn.textContent = '전체 결과 복사', 1500); }
    });
  }

  async function generate() {
    const topic = document.getElementById('topic').value.trim();
    const filledRefs = refs.filter(r => r.trim());
    if (!topic) { alert('주제를 입력해주세요.'); return; }

    const btn = document.getElementById('gen-btn');
    btn.disabled = true;
    btn.textContent = '생성 중...';
    document.getElementById('divider').style.display = 'block';
    document.getElementById('result-area').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        AI가 기획안을 작성하고 있습니다...
      </div>`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic, refs: filledRefs }),
      });

      const data = await res.json();

      if (!res.ok) {
        document.getElementById('result-area').innerHTML = `<div class="error">오류: ${data.error}</div>`;
      } else {
        const items = data.items;
        let html = items.map((item, i) => `
          <div class="result-item">
            <div class="result-num">기획안 ${i+1}</div>
            <div class="result-title">${item.title}</div>
            <div class="result-desc">${item.desc}</div>
            ${item.hook ? `<div class="result-hook">흡입 포인트: ${item.hook}</div>` : ''}
          </div>`).join('');
        html += `<button class="copy-btn" id="copy-all-btn" onclick='copyAll(${JSON.stringify(items)})'>전체 결과 복사</button>`;
        document.getElementById('result-area').innerHTML = html;
      }
    } catch(e) {
      document.getElementById('result-area').innerHTML = `<div class="error">네트워크 오류: ${e.message}</div>`;
    }

    btn.disabled = false;
    btn.textContent = '기획안 10개 생성하기';
  }

  renderRefs();
</script>
</body>
</html>
